name: Daily Paper Trader

on:
  schedule:
    - cron: '15 13 * * 1-5'  # 9:15am EDT (UTC-4), Mon-Fri
    # NOTE: change to '15 14 * * 1-5' in winter when clocks fall back to EST (UTC-5)
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: models-weekly-${{ github.run_id }}
          restore-keys: |
            models-weekly-

      - name: Run daily trader
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python trader.py

      - name: Commit updated database
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -f paper_trading.db
          git diff --staged --quiet || git commit -m "chore: update paper trading DB [skip ci]"
          git push
